<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Anti Gravity</title>
        <link rel="icon" type="image/x-icon" href="Images/logo.png" />

        <!-- CSS -->
        <link rel="stylesheet" href="style.css"/>
        
        <!-- Outfit Font-Family Link -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <!-- Display-None -->
        <section style="display: none">
            <img src="Images/grey ball.svg" id="grey-ball">
            <img src="Images/blueportal.png" id="portal-img">
            <img src="Images/backdrop.svg" id="backdrop">
            <img src="Images/squig2.svg" id="grass">
            <img src="Images/grass plane.svg" id="plane">
            <img src="Images/transparentTopBar2.svg" id="top-bar">
            <img src="Images/cloudTopBar.svg" id="cloud-bar">
        </section>

        <main>
            <canvas id="game-canvas" width="1000px" height="500px"></canvas>
        </main>
        
        <!-- JS -->
        <script defer src="functions.js"></script>
        <script defer src="script.js"></script>
    </body>
</html>
